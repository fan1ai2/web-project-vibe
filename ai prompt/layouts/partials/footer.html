<footer class="site-footer" role="contentinfo">
  <div class="footer-inner">
    <div class="footer-grid">
      <div class="footer-col footer-brand-col">
        <span class="footer-logo">{{ .Site.Data.site.name }}</span>
        <p class="footer-tagline">{{ .Site.Data.site.tagline }}</p>
      </div>
      <div class="footer-col">
        <h4 class="footer-heading">产品</h4>
        <a href="{{ $.Site.Data.site.basepath }}/prompts/">提示词库</a>
        <a href="{{ $.Site.Data.site.basepath }}/tools/">在线工具箱</a>
      </div>
      <div class="footer-col">
        <h4 class="footer-heading">支持</h4>
        <a href="{{ $.Site.Data.site.basepath }}/about/">关于我们</a>
        <a href="{{ $.Site.Data.site.basepath }}/contact/">联系我们</a>
      </div>
      <div class="footer-col">
        <h4 class="footer-heading">法律</h4>
        <a href="{{ $.Site.Data.site.basepath }}/privacy/">隐私政策</a>
        <a href="{{ $.Site.Data.site.basepath }}/terms/">使用条款</a>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; {{ now.Format "2006" }} {{ .Site.Data.site.name }} — 高质量中文提示词独立刊物</p>
    </div>
  </div>
</footer>
