<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="lg" x1="20" y1="20" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F97316"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
  </defs>
  <!-- background circle -->
  <circle cx="60" cy="60" r="56" fill="url(#lg)" opacity=".12"/>
  <circle cx="60" cy="60" r="46" fill="url(#lg)" opacity=".18"/>
  <!-- stylized 闲 as simplified travel mark: mountain + path -->
  <!-- mountain -->
  <path d="M20 82 L42 38 L60 62 L78 34 L100 82" stroke="url(#lg)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- sun -->
  <circle cx="74" cy="38" r="10" fill="url(#lg)"/>
  <!-- path/dot trail suggesting leisurely journey -->
  <circle cx="36" cy="72" r="3" fill="url(#lg)" opacity=".5"/>
  <circle cx="48" cy="64" r="3" fill="url(#lg)" opacity=".7"/>
  <circle cx="60" cy="58" r="3" fill="url(#lg)" opacity=".9"/>
</svg>
