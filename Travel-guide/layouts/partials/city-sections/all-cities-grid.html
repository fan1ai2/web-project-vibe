<div class="all-cities-section" id="all-cities-full" hidden>
  <div class="section-inner">
    <div class="section-header">
      <h2>全部 31 个省会城市</h2>
      <p>覆盖全国 8 大区域，每个城市都有专属自由行攻略</p>
    </div>
    <div class="city-grid" id="all-cities-grid">
      {{ range .Site.Data.cities }}
      <article class="city-card{{ if not .featured }} city-card--basic{{ end }}" onclick="location.href='{{ $.Site.Data.site.basepath }}{{ .link }}'" role="link" tabindex="0" aria-label="{{ .name }}旅游攻略" onkeydown="if(event.key==='Enter') location.href='{{ $.Site.Data.site.basepath }}{{ .link }}'">
        {{ if .featured }}
        <div class="city-card-accent city-card-accent--{{ replace (replace .link "/cities/" "") "/" "" }}"></div>
        {{ end }}
        <div class="city-card-img" style="background-image:url('{{ $.Site.Data.site.basepath }}{{ .image }}');">
          <div class="city-card-name-overlay">{{ .name }}</div>
        </div>
        <div class="city-card-body">
          <h3><a href="{{ $.Site.Data.site.basepath }}{{ .link }}">{{ .name }}旅游攻略</a></h3>
          <div class="city-card-tags">{{ range .tags }}<span>{{ . }}</span>{{ end }}</div>
          <p>{{ .summary }}</p>
        </div>
      </article>
      {{ end }}
    </div>
  </div>
</div>
