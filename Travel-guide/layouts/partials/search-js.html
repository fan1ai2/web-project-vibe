let activeProvince = null;

function getFilteredCities() {
  var filtered = cities;
  if (activeProvince) { filtered = filtered.filter(function(c) { return c.province === activeProvince; }); }
  var q = (document.getElementById('city-search').value || '').trim().toLowerCase();
  if (q) {
    filtered = filtered.filter(function(c) {
      return c.name.indexOf(q) !== -1 || c.province.indexOf(q) !== -1 || (PROVINCE_NAMES[c.province] || '').indexOf(q) !== -1;
    });
  }
  return filtered;
}

function showDropdown() {
  var dd = document.getElementById('search-dropdown');
  var results = getFilteredCities();
  if (results.length === 0) {
    dd.innerHTML = '<div class="search-dropdown-empty">没有匹配的城市，换个关键词试试</div>';
  } else {
    dd.innerHTML = results.map(function(c) {
      var href = c.unlocked ? '/cities/' + c.slug + '/' : '/coming-soon/';
      return '<div class="search-dropdown-item" onclick="location.href=\'' + href + '\'" role="link" tabindex="0" aria-label="' + c.name + '">'
        + '<span class="sdi-name">' + c.name + '</span>'
        + '<span class="sdi-province">' + (PROVINCE_NAMES[c.province] || '') + '</span></div>';
    }).join('');
  }
  dd.classList.add('active');
}

function filterDropdown() { showDropdown(); }
function hideDropdown() { document.getElementById('search-dropdown').classList.remove('active'); }

function switchProvince(province) {
  activeProvince = (activeProvince === province) ? null : province;
  document.getElementById('city-search').value = '';
  document.querySelectorAll('.province-chip').forEach(function(chip) {
    chip.classList.toggle('active', chip.dataset.province === activeProvince);
  });
  showDropdown();
}

document.addEventListener('click', function(e) {
  if (!document.getElementById('search-wrapper').contains(e.target)) { hideDropdown(); }
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { hideDropdown(); }
});
</script>
