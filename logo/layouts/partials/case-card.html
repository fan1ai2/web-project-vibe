<article class="case-card" data-industry="{{ .industry }}" data-style="{{ .style }}">
  <div class="case-card-image">
    <svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
      <rect width="400" height="280" fill="#f8f8f7"/>
      {{ $color := index .colors 0 }}
      <circle cx="200" cy="110" r="36" fill="none" stroke="{{ $color }}" stroke-width="1.5" opacity="0.3"/>
      <text x="200" y="122" text-anchor="middle" dominant-baseline="middle"
            font-family="'Noto Serif SC', serif" font-size="42" font-weight="600"
            fill="{{ $color }}">{{ slicestr .brand 0 1 }}</text>
    </svg>
  </div>
  <div class="case-card-body">
    <h3 class="case-card-brand">{{ .brand }}</h3>
    <div class="case-card-tags">
      <span class="tag">{{ .style }}</span>
      <span class="tag">{{ .industry }}</span>
    </div>
  </div>
  <a href="{{ or .RelPermalink (printf "/cases/%s/" .slug) }}" class="case-card-link" aria-label="查看 {{ .brand }} 案例详情"></a>
</article>
