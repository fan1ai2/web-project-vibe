<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta name="robots" content="index, follow">
<link rel="canonical" href="{{ .Permalink }}">

<meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}">
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">

<!-- Prevent FOUC: apply theme before paint -->
<script>(function(){var t=localStorage.getItem('logoforge-theme');if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');}})()</script>

<script>window.__API_BASE = '{{ .Site.Data.site.apibase }}';window.__BASEPATH = '{{ .Site.Data.site.basepath }}';</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ .Site.Data.site.basepath }}/css/style.css">
<script src="{{ .Site.Data.site.basepath }}/js/theme.js" defer></script>
<script src="{{ .Site.Data.site.basepath }}/js/auth.js" defer></script>
