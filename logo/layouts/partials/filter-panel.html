<div class="filter-panel">
  <h2 class="filter-title">设计参数</h2>

  <details class="filter-group" open>
    <summary>行业</summary>
    <div class="filter-chips" data-dimension="industry">
      <button class="filter-chip" data-value="科技/通信">科技</button>
      <button class="filter-chip" data-value="科技/消费电子">消费电子</button>
      <button class="filter-chip" data-value="运动/体育用品">运动</button>
      <button class="filter-chip" data-value="食品饮料">食品饮料</button>
      <button class="filter-chip" data-value="餐饮/咖啡">餐饮</button>
      <button class="filter-chip" data-value="茶饮">茶饮</button>
      <button class="filter-chip" data-value="汽车/出行">汽车</button>
      <button class="filter-chip" data-value="汽车/新能源">新能源</button>
      <button class="filter-chip" data-value="电商/零售">电商</button>
      <button class="filter-chip" data-value="互联网/科技">互联网</button>
      <button class="filter-chip" data-value="香氛/美妆">美妆</button>
      <button class="filter-chip" data-value="白酒/奢侈品">白酒</button>
      <button class="filter-chip" data-value="饮料/消费品">饮料</button>
      <button class="filter-chip" data-value="乳业/食品">乳业</button>
      <button class="filter-chip" data-value="物流/快递">物流</button>
      <button class="filter-chip" data-value="家电/制造">家电</button>
      <button class="filter-chip" data-value="服装/户外">服装</button>
      <button class="filter-chip" data-value="游戏/娱乐">游戏</button>
      <button class="filter-chip" data-value="电商/社交">社交电商</button>
      <button class="filter-chip" data-value="视频/娱乐">视频</button>
      <button class="filter-chip" data-value="茶饮/快餐">快餐</button>
      <button class="filter-chip" data-value="酒类/啤酒">啤酒</button>
      <button class="filter-chip" data-value="护肤/医疗">护肤</button>
      <button class="filter-chip" data-value="文具/教育">教育</button>
      <button class="filter-chip" data-value="潮玩/娱乐">潮玩</button>
      <button class="filter-chip" data-value="本地生活/科技">本地生活</button>
      <button class="filter-chip" data-value="服装/奢侈品">奢侈品</button>
    </div>
  </details>

  <details class="filter-group" open>
    <summary>风格</summary>
    <div class="filter-chips" data-dimension="style">
      <button class="filter-chip" data-value="极简几何">极简几何</button>
      <button class="filter-chip" data-value="极简现代">极简现代</button>
      <button class="filter-chip" data-value="动感流线">动感流线</button>
      <button class="filter-chip" data-value="自然写意">自然写意</button>
      <button class="filter-chip" data-value="现代轻奢">现代轻奢</button>
      <button class="filter-chip" data-value="新中式古典">新中式古典</button>
      <button class="filter-chip" data-value="未来极简">未来极简</button>
      <button class="filter-chip" data-value="工业极简">工业极简</button>
      <button class="filter-chip" data-value="东方极简">东方极简</button>
      <button class="filter-chip" data-value="科技稳健">科技稳健</button>
      <button class="filter-chip" data-value="潮酷极简">潮酷极简</button>
      <button class="filter-chip" data-value="玩趣波普">玩趣波普</button>
      <button class="filter-chip" data-value="动感几何">动感几何</button>
      <button class="filter-chip" data-value="活泼现代">活泼现代</button>
      <button class="filter-chip" data-value="东方雅致">东方雅致</button>
      <button class="filter-chip" data-value="亲和科技">亲和科技</button>
      <button class="filter-chip" data-value="温暖现代">温暖现代</button>
      <button class="filter-chip" data-value="经典奢华">经典奢华</button>
      <button class="filter-chip" data-value="经典怀旧">经典怀旧</button>
      <button class="filter-chip" data-value="圆润科技">圆润科技</button>
    </div>
  </details>

  <details class="filter-group" open>
    <summary>配色</summary>
    <div class="color-chips" data-dimension="colorScheme">
      <button class="color-chip-btn" data-value="单色渐变红" style="background:#CF0A2C" aria-label="单色渐变红"></button>
      <button class="color-chip-btn" data-value="单色橙" style="background:#FF6900" aria-label="橙色"></button>
      <button class="color-chip-btn" data-value="蓝白双色" style="background:linear-gradient(135deg,#003DA5 50%,#FFFFFF 50%)" aria-label="蓝白双色"></button>
      <button class="color-chip-btn" data-value="金黑红" style="background:linear-gradient(135deg,#C9A963 33%,#1A1A1A 33%,#1A1A1A 66%,#8B0000 66%)" aria-label="金黑红"></button>
      <button class="color-chip-btn" data-value="极致黑白" style="background:linear-gradient(135deg,#000 50%,#FFF 50%)" aria-label="极致黑白"></button>
      <button class="color-chip-btn" data-value="红黑撞色" style="background:linear-gradient(135deg,#E60012 50%,#1A1A1A 50%)" aria-label="红黑撞色"></button>
      <button class="color-chip-btn" data-value="多色跳跃" style="background:conic-gradient(#325AB4 0 90deg,#78E0DC 90deg 180deg,#FF5C8A 180deg 270deg,#FFB800 270deg 360deg)" aria-label="多色跳跃"></button>
      <button class="color-chip-btn" data-value="胭脂粉黛" style="background:linear-gradient(135deg,#C4375E 50%,#F2C4C9 50%)" aria-label="胭脂粉黛"></button>
      <button class="color-chip-btn" data-value="大地暖灰" style="background:linear-gradient(135deg,#8B8682 50%,#D4C9B8 50%)" aria-label="大地暖灰"></button>
      <button class="color-chip-btn" data-value="黑白金" style="background:linear-gradient(135deg,#1A1A1A 50%,#D4AF37 50%)" aria-label="黑白金"></button>
      <button class="color-chip-btn" data-value="黄黑撞色" style="background:linear-gradient(135deg,#FFD700 50%,#000 50%)" aria-label="黄黑撞色"></button>
      <button class="color-chip-btn" data-value="自然色系" style="background:linear-gradient(135deg,#2E8B57 50%,#F5F5DC 50%)" aria-label="自然色系"></button>
      <button class="color-chip-btn" data-value="科技蓝渐变" style="background:linear-gradient(135deg,#0066CC 50%,#00A8E8 50%)" aria-label="科技蓝渐变"></button>
      <button class="color-chip-btn" data-value="单色强调红" style="background:#EE1C25" aria-label="红色"></button>
      <button class="color-chip-btn" data-value="红白双色" style="background:linear-gradient(135deg,#E2231A 50%,#C0C0C0 50%)" aria-label="红银"></button>
      <button class="color-chip-btn" data-value="蓝红双色" style="background:linear-gradient(135deg,#0066FF 50%,#DE1F3E 50%)" aria-label="蓝红双色"></button>
      <button class="color-chip-btn" data-value="经典绿金" style="background:linear-gradient(135deg,#006633 50%,#D4AF37 50%)" aria-label="绿金"></button>
      <button class="color-chip-btn" data-value="冰雪蓝白红" style="background:linear-gradient(135deg,#0066CC 33%,#FFF 33%,#FFF 66%,#E60012 66%)" aria-label="蓝白红"></button>
      <button class="color-chip-btn" data-value="羊绒暖棕" style="background:linear-gradient(135deg,#8B7355 50%,#D2B48C 50%)" aria-label="暖棕"></button>
      <button class="color-chip-btn" data-value="茶韵暖棕" style="background:linear-gradient(135deg,#5D4037 50%,#FFF8E1 50%)" aria-label="茶棕"></button>
    </div>
  </details>

  <details class="filter-group" open>
    <summary>字体</summary>
    <div class="filter-chips" data-dimension="fontStyle">
      <button class="filter-chip font-sample" data-value="无衬线几何"><span class="font-preview">Ag</span>无衬线几何</button>
      <button class="filter-chip font-sample" data-value="无衬线圆角"><span class="font-preview">Ag</span>无衬线圆角</button>
      <button class="filter-chip font-sample" data-value="无衬线现代"><span class="font-preview">Ag</span>无衬线现代</button>
      <button class="filter-chip font-sample" data-value="无衬线粗体"><span class="font-preview">Ag</span>无衬线粗体</button>
      <button class="filter-chip font-sample" data-value="无衬线极简"><span class="font-preview">Ag</span>无衬线极简</button>
      <button class="filter-chip font-sample" data-value="中文宋体"><span class="font-preview">字</span>宋体</button>
      <button class="filter-chip font-sample" data-value="中文楷体"><span class="font-preview">字</span>楷体</button>
      <button class="filter-chip font-sample" data-value="中文书法"><span class="font-preview">字</span>书法</button>
    </div>
  </details>

  <details class="filter-group" open>
    <summary>构图</summary>
    <div class="filter-chips" data-dimension="layoutType">
      <button class="filter-chip layout-sample" data-value="图标型">
        <svg class="layout-icon-svg" width="14" height="14" viewBox="0 0 14 14"><rect x="6" y="1" width="2" height="12" rx="0.5" transform="rotate(45 7 7)" fill="currentColor" opacity="0.7"/></svg>图标型
      </button>
      <button class="filter-chip layout-sample" data-value="文字型">
        <svg class="layout-icon-svg" width="14" height="14" viewBox="0 0 14 14"><text x="7" y="11" text-anchor="middle" font-size="11" font-weight="600" fill="currentColor" font-family="Inter,sans-serif">A</text></svg>文字型
      </button>
      <button class="filter-chip layout-sample" data-value="徽章型">
        <svg class="layout-icon-svg" width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="5.5" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="7" cy="7" r="2" fill="currentColor" opacity="0.6"/></svg>徽章型
      </button>
      <button class="filter-chip layout-sample" data-value="图标+文字组合型">
        <svg class="layout-icon-svg" width="14" height="14" viewBox="0 0 14 14"><rect x="6" y="0.5" width="2" height="6" rx="0.5" transform="rotate(45 7 3.5)" fill="currentColor" opacity="0.7"/><text x="7" y="13" text-anchor="middle" font-size="6" font-weight="600" fill="currentColor" font-family="Inter,sans-serif">A</text></svg>组合型
      </button>
    </div>
  </details>

  <div class="filter-input-group">
    <label for="brandName" class="filter-label">品牌名称</label>
    <input type="text" id="brandName" class="filter-input" placeholder="输入品牌名" maxlength="20" autocomplete="off">
    <div class="char-count" id="charCount">0/20</div>
  </div>

  <div class="filter-input-group">
    <label for="extraConditions" class="filter-label">补充描述</label>
    <textarea id="extraConditions" class="filter-input filter-textarea" placeholder="描述你想要的风格细节..." maxlength="200" rows="2"></textarea>
  </div>

  <button class="btn-generate" id="generateBtn" disabled>生成 Logo</button>
</div>
