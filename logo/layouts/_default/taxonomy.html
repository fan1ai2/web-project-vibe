{{ define "main" }}
<section class="page">
  <div class="container-narrow">
    <h1>{{ .Title }}</h1>
    <div class="page-content">
      {{ .Content }}
    </div>
    {{ range .Pages }}
    <article class="page-item">
      <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
      <p>{{ len .Pages }} 篇内容</p>
    </article>
    {{ end }}
  </div>
</section>
{{ end }}
