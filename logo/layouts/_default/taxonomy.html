{{ define "main" }}
<section class="taxonomy-page">
  <div class="container">
    <nav class="breadcrumb">
      <a href="{{ .Site.Home.RelPermalink }}">首页</a>
      <span aria-hidden="true">/</span>
      <span aria-current="page">{{ .Title }}</span>
    </nav>

    <div class="taxonomy-header">
      <h1>{{ .Title }} Logo 设计灵感</h1>
      <p class="text-body">{{ len .Pages }} 个分类</p>
    </div>

    <div class="taxonomy-term-list">
      {{ range .Pages }}
      <a href="{{ .RelPermalink }}" class="taxonomy-term-card">
        <span class="taxonomy-term-name">{{ .Title }}</span>
        <span class="taxonomy-term-count">{{ len .Pages }} 个案例</span>
      </a>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}

{{ define "head_extra" }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "CollectionPage",
  "name": "{{ .Title }} Logo 设计灵感",
  "description": "浏览 {{ .Title }} 分类下的品牌 Logo 设计风格，获取 AI 生成提示词。",
  "url": "{{ .Permalink }}"
}
</script>
{{ end }}
