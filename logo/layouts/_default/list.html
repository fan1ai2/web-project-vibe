{{ define "main" }}
<section class="taxonomy-page">
  <div class="container">
    <nav class="breadcrumb">
      <a href="{{ .Site.Home.RelPermalink }}">首页</a>
      <span aria-hidden="true">/</span>
      <span aria-current="page">{{ .Title }}</span>
    </nav>

    <div class="taxonomy-header">
      <h1>{{ .Title }} Logo 设计灵感</h1>
      <p class="text-body">{{ len .Pages }} 个案例</p>
    </div>

    <div class="case-grid">
      {{ range .Pages }}
      <article class="case-card">
        <div class="case-card-image">
          <svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
            <rect width="400" height="300" fill="#1E1E1E" rx="4" />
            <text x="200" y="150" text-anchor="middle" dominant-baseline="middle" font-family="'Playfair Display', 'Noto Serif SC', Georgia, serif" font-size="48" font-weight="700" fill="{{ index .Params.colors 0 }}">{{ slicestr .Params.brand 0 2 }}</text>
          </svg>
        </div>
        <div class="case-card-body">
          <h3 class="case-card-brand">{{ .Params.brand }}</h3>
          <div class="case-card-tags">
            <span class="tag">{{ .Params.style }}</span>
            <span class="tag">{{ .Params.industry }}</span>
          </div>
        </div>
        <a href="{{ .RelPermalink }}" class="case-card-link">
          <span class="sr-only">查看详情</span>
        </a>
      </article>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}

{{ define "head_extra" }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "CollectionPage",
  "name": "{{ .Title }} Logo 设计灵感",
  "description": "浏览 {{ .Title }} 风格的品牌 Logo 设计案例，获取 AI 生成提示词。",
  "url": "{{ .Permalink }}",
  "mainEntity": {
    "@type": "ItemList",
    "itemListElement": [
      {{ range $i, $p := .Pages }}
      {{ if $i }},{{ end }}
      {
        "@type": "CreativeWork",
        "position": {{ add $i 1 }},
        "name": "{{ $p.Params.brand }} Logo 设计",
        "url": "{{ $p.Permalink }}"
      }
      {{ end }}
    ]
  }
}
</script>
{{ end }}
