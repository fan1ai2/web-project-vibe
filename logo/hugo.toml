baseURL = "http://10.100.1.243/miniapp/logo/"
languageCode = "zh-CN"
title = "LogoForge"
enableRobotsTXT = true
enableEmoji = false

[params]
  description = "AI 驱动的商标 Logo 自动生成工具。选择行业、风格、配色、字体、构图，一键生成专属品牌标识。"
  ogImage = "/images/og-default.jpg"

[outputs]
  home = ["HTML", "RSS", "Sitemap"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]

[privacy]
  [privacy.googleAnalytics]
    disable = true
  [privacy.youtube]
    privacyEnhanced = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
