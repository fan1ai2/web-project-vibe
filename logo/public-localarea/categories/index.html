<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta property="og:url" content="http://10.100.1.243/miniapp/logo/categories/">


<script>(function(){var t=localStorage.getItem('logoforge-theme');if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');}})()</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/css/style.css">
<script src="/js/theme.js" defer></script>
<script src="/js/auth.js" defer></script>

  
</head>
<body>
  <header class="site-header">
  <div class="header-inner">
    <a href="/miniapp/logo/" class="header-brand">
      <svg class="header-logo" width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
        <rect x="2" y="2" width="24" height="24" rx="4" stroke="currentColor" stroke-width="1.8" transform="rotate(12 14 14)"/>
        <circle cx="14" cy="14" r="5" fill="currentColor" opacity="0.85"/>
        <circle cx="14" cy="14" r="2.2" fill="var(--c-bg)"/>
      </svg>
      <span class="header-brand-text">LogoForge</span>
    </a>

    <nav class="header-nav">
      <a href="/miniapp/logo/" class="">首页</a>
      <a href="/generator/" class="">创作台</a>
      <a href="/about/">关于我们</a>
    </nav>

    <div class="header-actions">
      <button class="header-icon-btn" id="themeToggle" aria-label="切换深色模式">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="9" r="3.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M9 1.5V3M9 15v1.5M2.5 9H1m16 0h-1.5M3.4 3.4l1 1m9.2 9.2l1 1M3.4 14.6l1-1m9.2-9.2l1-1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M14.5 10.5a6 6 0 01-7-7 6 6 0 107 7z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
      </button>

      <button class="header-lang-btn" id="langSwitch" aria-label="切换语言">EN</button>

      <span class="auth-user" id="authUser" style="display:none"></span>
      <button class="btn btn-outline-accent btn-sm" id="authLoginBtn">登录</button>
      <button class="btn btn-ghost btn-sm" id="authLogoutBtn" style="display:none">退出</button>
    </div>
  </div>
</header>

  
<div class="auth-modal-overlay" id="authModal">
  <div class="auth-modal">
    <button class="auth-modal-close" id="authModalClose" aria-label="关闭">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4 4l10 10M14 4L4 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>

    <div class="auth-header">
      <svg class="auth-logo" width="32" height="32" viewBox="0 0 28 28" fill="none">
        <rect x="2" y="2" width="24" height="24" rx="4" stroke="currentColor" stroke-width="1.8" transform="rotate(12 14 14)"/>
        <circle cx="14" cy="14" r="5" fill="currentColor" opacity="0.85"/>
        <circle cx="14" cy="14" r="2.2" fill="var(--c-surface)"/>
      </svg>
      <p class="auth-subtitle">登录或注册，开始创作你的品牌 Logo</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">登录</button>
      <button class="auth-tab" data-tab="register">注册</button>
    </div>

    <form class="auth-form" id="loginForm" autocomplete="off">
      <div class="auth-form-group">
        <label for="loginUsername">用户名</label>
        <input type="text" id="loginUsername" name="username" placeholder="输入用户名" required autocomplete="username">
      </div>
      <div class="auth-form-group">
        <label for="loginPassword">密码</label>
        <input type="password" id="loginPassword" name="password" placeholder="至少 6 位" required autocomplete="current-password">
      </div>
      <div class="auth-form-error"></div>
      <button type="submit">登录</button>
    </form>

    <form class="auth-form" id="registerForm" style="display:none" autocomplete="off">
      <div class="auth-form-group">
        <label for="registerUsername">用户名</label>
        <input type="text" id="registerUsername" name="username" placeholder="设置用户名" required autocomplete="username">
      </div>
      <div class="auth-form-group">
        <label for="registerPassword">设置密码</label>
        <input type="password" id="registerPassword" name="password" placeholder="至少 6 位" required autocomplete="new-password">
      </div>
      <div class="auth-form-group">
        <label for="registerConfirm">确认密码</label>
        <input type="password" id="registerConfirm" name="confirm" placeholder="再次输入密码" required autocomplete="new-password">
      </div>
      <div class="auth-form-group">
        <label for="registerCaptcha">验证码</label>
        <div class="input-row">
          <input type="text" id="registerCaptcha" name="captchaCode" placeholder="输入验证码" maxlength="6" autocomplete="off" style="flex:1">
          <img id="captchaImg" src="" alt="验证码" style="display:none; height:42px; cursor:pointer; border:1px solid var(--c-line); border-radius:4px" title="点击刷新验证码">
        </div>
      </div>
      <div class="auth-form-error"></div>
      <button type="submit">注册</button>
    </form>
  </div>
</div>

  <main>
    
<section class="page">
  <div class="container-narrow">
    <h1>Categories</h1>
    <div class="page-content">
      
    </div>
    
  </div>
</section>

  </main>
  <footer class="site-footer">
  <div class="container">
    <div class="footer-grid">
      <div class="footer-brand">
        <svg class="footer-logo" width="24" height="24" viewBox="0 0 28 28" fill="none" aria-hidden="true">
          <rect x="2" y="2" width="24" height="24" rx="4" stroke="currentColor" stroke-width="1.8" transform="rotate(12 14 14)"/>
          <circle cx="14" cy="14" r="5" fill="currentColor" opacity="0.85"/>
          <circle cx="14" cy="14" r="2.2" fill="var(--c-bg)"/>
        </svg>
        <span>LogoForge</span>
        <p class="footer-tagline">AI 驱动的品牌 Logo 生成工具。<br>从灵感到成品，几分钟完成。</p>
      </div>

      <div class="footer-links">
        <h4>产品</h4>
        <a href="/generator/">创作台</a>
      </div>

      <div class="footer-links">
        <h4>法律</h4>
        <a href="/privacy/">隐私政策</a>
        <a href="/terms/">使用条款</a>
      </div>

      <div class="footer-links">
        <h4>支持</h4>
        <a href="mailto:hello@logoforge.app">联系我们</a>
        <button class="lang-switch" id="langSwitch" aria-label="切换语言">EN / 中文</button>
      </div>
    </div>

    <div class="footer-bottom">
      <p>&copy; 2026 LogoForge</p>
    </div>
  </div>
</footer>

</body>
</html>
