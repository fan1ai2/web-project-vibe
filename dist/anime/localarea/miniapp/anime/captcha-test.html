.result { margin-top: 12px; padding: 8px; border-radius: 4px; }

.error { background: #fee; color: #c00; }

<div style="margin-top:16px">
  <input type="text" id="captcha-code" placeholder="Enter captcha code" maxlength="6">
  <button id="verify-btn">Verify</button>
</div>
<div id="result"></div>

<script>
var captchaId = '137d0f11313d5249';

document.getElementById('captcha-img').addEventListener('click', function() {
  fetch('http://localhost:33101/api/captcha/generate', { method: 'POST', headers: {'Content-Type': 'application/json'} })
    .then(r => r.json())
    .then(data => {
      captchaId = data.data.captcha_id;
      this.src = data.data.captcha_image;
      document.querySelector('code').textContent = captchaId;
      document.getElementById('result').innerHTML = '';
    });
});

document.getElementById('verify-btn').addEventListener('click', function() {
  var code = document.getElementById('captcha-code').value.trim();
  if (!code) return;
  fetch('http://localhost:33101/api/auth/register', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({username: 'test@test.com', password: 'test123456', captcha_id: captchaId, captcha_code: code})
  })
  .then(r => r.json())
  .then(data => {
    var div = document.getElementById('result');
    if (data.code === 200) {
      div.innerHTML = '<div class="result success">SUCCESS: ' + JSON.stringify(data) + '</div>';
    } else {
      div.innerHTML = '<div class="result error">ERROR: ' + data.msg + '</div>';
    }
  });
});
</script>
