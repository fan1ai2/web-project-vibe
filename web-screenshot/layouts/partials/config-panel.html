<section class="card config-section" aria-label="截图参数">
  <div class="config-grid">
    <div class="config-item">
      <label class="config-label">视口尺寸</label>
      <div class="segmented-control" id="viewport-group" role="radiogroup" aria-label="视口尺寸">
        <button class="seg-btn active" data-viewport="1440x900" role="radio" aria-checked="true">桌面</button>
        <button class="seg-btn" data-viewport="768x1024" role="radio" aria-checked="false">平板</button>
        <button class="seg-btn" data-viewport="375x812" role="radio" aria-checked="false">手机</button>
      </div>
    </div>
    <div class="config-item">
      <label class="config-label">图片格式</label>
      <div class="segmented-control" id="format-group" role="radiogroup" aria-label="图片格式">
        <button class="seg-btn active" data-format="png" role="radio" aria-checked="true">PNG</button>
        <button class="seg-btn" data-format="jpeg" role="radio" aria-checked="false">JPEG</button>
        <button class="seg-btn" data-format="webp" role="radio" aria-checked="false">WebP</button>
      </div>
    </div>
    <div class="config-item">
      <label class="config-label" for="quality-slider">画质 <span id="quality-value">80%</span></label>
      <input type="range" id="quality-slider" class="slider" min="10" max="100" value="80" aria-label="画质">
    </div>
    <div class="config-item">
      <label class="config-label config-toggle" for="fullpage-toggle">
        <span>全页截图</span>
        <input type="checkbox" id="fullpage-toggle" class="toggle-switch">
        <span class="toggle-track" aria-hidden="true"></span>
      </label>
    </div>
  </div>
</section>
