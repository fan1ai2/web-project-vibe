<!DOCTYPE html>
<html lang="{{ .Language.Lang }}" data-theme="light">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  {{ partial "header.html" . }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  {{ partial "auth-modal.html" . }}
  {{ partial "payment-modal.html" . }}
  <script src="/js/api.js" defer></script>
  {{ $js := resources.Get "js/main.js" | minify | fingerprint }}
  <script src="{{ $js.RelPermalink }}" defer></script>
</body>
</html>
