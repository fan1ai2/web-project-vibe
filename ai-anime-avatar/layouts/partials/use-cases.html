<section class="use-cases section watercolor-bg" id="use-cases">
  <div class="container">
    <div class="section__header">
      <h2 class="section__title">{{ i18n "useCasesTitle" }}</h2>
      <p class="section__subtitle">{{ i18n "useCasesSubtitle" }}</p>
    </div>

    <div class="use-cases__grid">

      <!-- Emerging Artists -->
      <div class="use-case-card use-case-card--artist">
        <div class="use-case-card__icon">
          <svg viewBox="0 0 80 80" fill="none" aria-hidden="true">
            <rect x="20" y="28" width="40" height="32" rx="4" stroke="var(--color-primary)" stroke-width="1.5"/>
            <path d="M28 20l2 8h20l2-8" stroke="var(--color-primary)" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="30" cy="40" r="4" fill="var(--color-primary)" opacity="0.3"/>
            <circle cx="40" cy="44" r="5" fill="var(--color-primary)" opacity="0.25"/>
            <circle cx="52" cy="38" r="3" fill="var(--color-primary)" opacity="0.3"/>
            <rect x="27" y="16" width="26" height="4" rx="2" fill="var(--color-primary)" opacity="0.5"/>
            <circle cx="18" cy="14" r="1.2" fill="var(--color-primary)" opacity="0.4"/>
            <circle cx="62" cy="12" r="1.5" fill="var(--color-primary)" opacity="0.35"/>
          </svg>
        </div>
        <h3 class="use-case-card__title">{{ i18n "useCasesArtistTitle" }}</h3>
        <p class="use-case-card__desc">{{ i18n "useCasesArtistDesc" }}</p>
      </div>

      <!-- Content Creators -->
      <div class="use-case-card use-case-card--creator">
        <div class="use-case-card__icon">
          <svg viewBox="0 0 80 80" fill="none" aria-hidden="true">
            <rect x="14" y="22" width="40" height="36" rx="5" stroke="var(--color-accent)" stroke-width="1.5"/>
            <circle cx="34" cy="38" r="12" stroke="var(--color-accent)" stroke-width="1.5"/>
            <circle cx="34" cy="38" r="6" fill="var(--color-accent)" opacity="0.15"/>
            <circle cx="34" cy="38" r="3" fill="var(--color-accent)" opacity="0.3"/>
            <rect x="56" y="30" width="14" height="10" rx="3" stroke="var(--color-accent)" stroke-width="1.5"/>
            <path d="M63 36l3-3 3 3" stroke="var(--color-accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="26" cy="16" r="1.5" fill="var(--color-accent)" opacity="0.4"/>
            <circle cx="60" cy="18" r="1" fill="var(--color-accent)" opacity="0.35"/>
          </svg>
        </div>
        <h3 class="use-case-card__title">{{ i18n "useCasesCreatorTitle" }}</h3>
        <p class="use-case-card__desc">{{ i18n "useCasesCreatorDesc" }}</p>
      </div>

      <!-- Business Professionals -->
      <div class="use-case-card use-case-card--business">
        <div class="use-case-card__icon">
          <svg viewBox="0 0 80 80" fill="none" aria-hidden="true">
            <rect x="22" y="38" width="36" height="26" rx="4" stroke="var(--color-secondary)" stroke-width="1.5"/>
            <path d="M30 38V28a10 10 0 0120 0v10" stroke="var(--color-secondary)" stroke-width="1.5"/>
            <line x1="26" y1="50" x2="54" y2="50" stroke="var(--color-secondary)" stroke-width="1" opacity="0.4"/>
            <line x1="26" y1="55" x2="48" y2="55" stroke="var(--color-secondary)" stroke-width="1" opacity="0.25"/>
            <circle cx="16" cy="16" r="1.5" fill="var(--color-secondary)" opacity="0.4"/>
            <circle cx="64" cy="22" r="1.2" fill="var(--color-secondary)" opacity="0.35"/>
          </svg>
        </div>
        <h3 class="use-case-card__title">{{ i18n "useCasesBusinessTitle" }}</h3>
        <p class="use-case-card__desc">{{ i18n "useCasesBusinessDesc" }}</p>
      </div>

    </div>
  </div>
</section>
