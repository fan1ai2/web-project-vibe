<div class="auth-modal" id="auth-modal" role="dialog" aria-modal="true" aria-label="{{ i18n "authTitle" }}">
  <div class="auth-modal__overlay" id="auth-modal-overlay"></div>
  <div class="auth-modal__content">
    <button class="auth-modal__close" id="auth-modal-close" aria-label="{{ i18n "authClose" }}"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M4 4l8 8M12 4l-8 8"/></svg></button>

    <div class="auth-modal__tabs" role="tablist">
      <button class="auth-modal__tab auth-modal__tab--active" id="auth-tab-login" role="tab" aria-selected="true">{{ i18n "authLogin" }}</button>
      <button class="auth-modal__tab" id="auth-tab-register" role="tab" aria-selected="false">{{ i18n "authRegister" }}</button>
    </div>

    <form class="auth-modal__form auth-modal__form--active" id="auth-form-login" novalidate>
      <div class="auth-modal__field">
        <label class="auth-modal__label" for="auth-login-email">{{ i18n "authEmail" }}</label>
        <input class="auth-modal__input" type="email" id="auth-login-email" placeholder="your@email.com" required autocomplete="email">
      </div>
      <div class="auth-modal__field">
        <label class="auth-modal__label" for="auth-login-password">{{ i18n "authPassword" }}</label>
        <input class="auth-modal__input" type="password" id="auth-login-password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <div class="auth-modal__captcha">
        <label class="auth-modal__label">{{ i18n "authCaptcha" }}</label>
        <div class="auth-modal__captcha-row">
          <input class="auth-modal__input auth-modal__captcha-input" type="text" id="auth-login-captcha" placeholder="{{ i18n "authCaptchaPlaceholder" }}" maxlength="6" autocomplete="off">
          <img class="auth-modal__captcha-img" id="auth-login-captcha-img" src="" alt="Captcha" title="Click to refresh">
        </div>
      </div>
      <a href="#" class="auth-modal__forgot">{{ i18n "authForgot" }}</a>
      <button type="submit" class="auth-modal__submit">{{ i18n "authLogin" }}</button>
    </form>

    <form class="auth-modal__form" id="auth-form-register" novalidate>
      <div class="auth-modal__field">
        <label class="auth-modal__label" for="auth-register-email">{{ i18n "authEmail" }}</label>
        <input class="auth-modal__input" type="email" id="auth-register-email" placeholder="your@email.com" required autocomplete="email">
      </div>
      <div class="auth-modal__field">
        <label class="auth-modal__label" for="auth-register-password">{{ i18n "authPassword" }}</label>
        <input class="auth-modal__input" type="password" id="auth-register-password" placeholder="••••••••" required autocomplete="new-password">
      </div>
      <div class="auth-modal__field">
        <label class="auth-modal__label" for="auth-register-confirm">{{ i18n "authConfirm" }}</label>
        <input class="auth-modal__input" type="password" id="auth-register-confirm" placeholder="••••••••" required autocomplete="new-password">
      </div>
      <div class="auth-modal__captcha">
        <label class="auth-modal__label">{{ i18n "authCaptcha" }}</label>
        <div class="auth-modal__captcha-row">
          <input class="auth-modal__input auth-modal__captcha-input" type="text" id="auth-register-captcha" placeholder="{{ i18n "authCaptchaPlaceholder" }}" maxlength="6" autocomplete="off">
          <img class="auth-modal__captcha-img" id="auth-register-captcha-img" src="" alt="Captcha" title="Click to refresh">
        </div>
      </div>
      <button type="submit" class="auth-modal__submit">{{ i18n "authRegister" }}</button>
    </form>

    <div class="auth-modal__divider">{{ i18n "authOr" }}</div>

    <div class="auth-modal__social">
      <button class="auth-modal__social-btn" aria-label="{{ i18n "authGoogle" }}">
        <span class="auth-modal__social-icon">G</span>
        Google
      </button>
      <button class="auth-modal__social-btn" aria-label="{{ i18n "authGithub" }}">
        <span class="auth-modal__social-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg></span>
        GitHub
      </button>
    </div>
  </div>
</div>
