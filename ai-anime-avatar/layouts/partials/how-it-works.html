<section class="how-it-works section" id="how-it-works">
  <div class="container">
    <div class="section__header">
      <h2 class="section__title">{{ i18n "howTitle" }}</h2>
      <p class="section__subtitle">{{ i18n "howSubtitle" }}</p>
    </div>

    <div class="how__steps">
      <div class="how__step">
        <div class="how__step-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <h3 class="how__step-title">{{ i18n "howStep1Title" }}</h3>
        <p class="how__step-desc">{{ i18n "howStep1Desc" }}</p>
      </div>

      <div class="how__step">
        <div class="how__step-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
            <line x1="9" y1="9" x2="9.01" y2="9"/>
            <line x1="15" y1="9" x2="15.01" y2="9"/>
          </svg>
        </div>
        <h3 class="how__step-title">{{ i18n "howStep2Title" }}</h3>
        <p class="how__step-desc">{{ i18n "howStep2Desc" }}</p>
      </div>

      <div class="how__step">
        <div class="how__step-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </div>
        <h3 class="how__step-title">{{ i18n "howStep3Title" }}</h3>
        <p class="how__step-desc">{{ i18n "howStep3Desc" }}</p>
      </div>
    </div>
  </div>
</section>
