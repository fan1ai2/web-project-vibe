<section class="share section" id="share-section">
  <div class="container">
    <div class="section__header">
      <h2 class="section__title">{{ i18n "shareTitle" }}</h2>
    </div>

    <p style="text-align:center;font-size:var(--font-size-sm);color:var(--color-text-muted);margin-bottom:24px;">
      {{ i18n "shareFreeCount" }}
    </p>

    <div class="share__buttons">
      <button
        class="share__btn"
        id="share-weibo"
        aria-label="{{ i18n "shareWeibo" }}"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
          <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        {{ i18n "shareWeibo" }}
      </button>
      <button
        class="share__btn"
        id="share-copy"
        aria-label="{{ i18n "shareCopy" }}"
        data-original="{{ i18n "shareCopy" }}"
        data-copied="{{ i18n "shareCopied" }}"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true" class="share__copy-icon">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
        </svg>
        <span class="share__copy-text">{{ i18n "shareCopy" }}</span>
      </button>
    </div>
  </div>
</section>
